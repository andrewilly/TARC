name: Build Windows SFX Stub

on:
  push:
    paths:
      - 'src/stub.cpp'
      - 'src/engine.cpp'
      - 'src/io.cpp'
      - 'src/ui.cpp'
      - 'src/license.cpp'
      - 'CMakeListsStub.txt'
      - '.github/workflows/stub.yml'
  workflow_dispatch:

jobs:
  build-stub:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Prepare Build Directory
      shell: pwsh
      run: |
        mkdir build_stub
        copy CMakeListsStub.txt build_stub/CMakeLists.txt

    - name: Configure CMake (FetchContent)
      shell: pwsh
      run: |
        cmake -S build_stub -B _build_stub `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_MSVC_RUNTIME_LIBRARY="MultiThreaded"

    - name: Build SFX Stub
      shell: pwsh
      run: |
        cmake --build _build_stub --config Release

    - name: Verify Executable
      shell: pwsh
      run: |
        if (Test-Path "_build_stub/Release/tarc_sfx_stub.exe") {
          Write-Host "Stub compilato con successo!" -ForegroundColor Green
        } else {
          Write-Host "Errore: tarc_sfx_stub.exe non trovato." -ForegroundColor Red
          exit 1
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TARC-SFX-Stub-Win
        path: _build_stub/Release/tarc_sfx_stub.exe
