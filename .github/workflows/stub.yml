name: Build Windows SFX Stub

on:
  push:
    paths:
      - 'src/stub.cpp'
      - 'CMakeListsStub.txt'
      - 'CmakeListsStub.txt'
      - '.github/workflows/stub.yml'
  workflow_dispatch:

jobs:
  build-stub:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Configure CMake
      shell: pwsh
      run: |
        mkdir build_stub
        # Copiamo il CMakeListsStub.txt come CMakeLists.txt nella cartella di build
        copy CmakeListsStub.txt build_stub\CMakeLists.txt
        cd build_stub
        cmake -S . -B . -DCMAKE_BUILD_TYPE=Release

    - name: Build SFX Stub
      shell: pwsh
      run: |
        cd build_stub
        cmake --build . --config Release --parallel

    - name: Verify Executable
      shell: pwsh
      run: |
        if (Test-Path "build_stub\Release\tarc_sfx_stub.exe") {
          Write-Host "Stub compilato con successo!" -ForegroundColor Green
        } elseif (Test-Path "build_stub\CMakeFiles\tarc_sfx_stub.dir\Release\tarc_sfx_stub.exe") {
          Write-Host "Stub compilato con successo (percorso alternativo)!" -ForegroundColor Green
        } else {
          Write-Host "Errore: tarc_sfx_stub.exe non trovato." -ForegroundColor Red
          Get-ChildItem -Path "build_stub" -Recurse -Filter "*.exe" | ForEach-Object { Write-Host $_.FullName }
          exit 1
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TARC-SFX-Stub-Win
        path: |
          build_stub/Release/tarc_sfx_stub.exe
          build_stub/CMakeFiles/tarc_sfx_stub.dir/Release/tarc_sfx_stub.exe
        if-no-files-found: error