name: Build Windows SFX Stub

on:
  push:
    paths:
      - 'src/stub.cpp'
      - 'CMakeListsStub.txt'
      - '.github/workflows/stub.yml'
  workflow_dispatch: # Permette di lanciarlo manualmente dalla scheda "Actions"

jobs:
  build-stub:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Prepare Build Environment
      shell: pwsh
      run: |
        # Creiamo la cartella per la compilazione
        mkdir build_stub
        # Copiamo il file dedicato rinominandolo in quello standard atteso da CMake
        copy CMakeListsStub.txt build_stub/CMakeLists.txt
        
    - name: Configure CMake
      shell: pwsh
      run: |
        cd build_stub
        # Configuriamo puntando ai sorgenti che sono nella cartella superiore (..)
        cmake -S . -B . -DCMAKE_BUILD_TYPE=Release

    - name: Build SFX Stub
      shell: pwsh
      run: |
        cd build_stub
        # Lanciamo la compilazione effettiva
        cmake --build . --config Release

    - name: Verify Executable
      shell: pwsh
      run: |
        if (Test-Path "build_stub/Release/tarc_sfx_stub.exe") {
          Write-Host "Stub compilato con successo!" -ForegroundColor Green
        } else {
          Write-Host "Errore: Eseguibile non trovato." -ForegroundColor Red
          exit 1
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TARC-SFX-Stub-Win
        path: build_stub/Release/tarc_sfx_stub.exe
        retention-days: 7
