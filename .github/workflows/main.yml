name: Build TARC Cross-Platform

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: tarc-linux-x86_64
            executable: tarc
            cmake_arch_flags: ""

          - os: windows-latest
            artifact_name: tarc-windows-x64.exe
            executable: tarc.exe
            cmake_arch_flags: "-A x64"

          - os: macos-13
            artifact_name: tarc-macos-x86_64
            executable: tarc
            cmake_arch_flags: "-DCMAKE_OSX_ARCHITECTURES='x86_64'"

          - os: macos-latest
            artifact_name: tarc-macos-arm64
            executable: tarc
            cmake_arch_flags: "-DCMAKE_OSX_ARCHITECTURES='arm64'"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Windows: scarica librerie statiche con curl
    - name: Download LZMA source (Windows only)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        mkdir -p libs/lzma
        cd libs/lzma
        curl -L -k https://github.com/tukaani-project/xz/releases/download/v5.4.5/xz-5.4.5.tar.gz -o lzma.tar.gz
        tar -xzf lzma.tar.gz --strip-components=1
        rm lzma.tar.gz
        echo "LZMA downloaded successfully"

    - name: Download XXHASH source (Windows only)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        mkdir -p libs/xxhash
        cd libs/xxhash
        curl -L -k https://github.com/Cyan4973/xxHash/releases/download/v0.8.2/xxhash-0.8.2.tar.gz -o xxhash.tar.gz
        tar -xzf xxhash.tar.gz --strip-components=1
        rm xxhash.tar.gz
        echo "XXHASH downloaded successfully"

    # Linux: installa dipendenze
    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake liblzma-dev libxxhash-dev

    # macOS Intel (macos-13) - installa dipendenze x86_64
    - name: Install dependencies (macOS Intel)
      if: runner.os == 'macOS' && matrix.os == 'macos-13'
      run: |
        arch -x86_64 brew install cmake xz xxhash

    # macOS ARM (macos-latest) - installa dipendenze arm64
    - name: Install dependencies (macOS ARM)
      if: runner.os == 'macOS' && matrix.os == 'macos-latest'
      run: |
        brew install cmake xz xxhash

    - name: Setup MSVC (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure CMake (Linux/Windows)
      if: runner.os != 'macOS'
      shell: bash
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_C_STANDARD=11 \
          ${{ matrix.cmake_arch_flags }}

    - name: Configure CMake (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_C_STANDARD=11 \
          ${{ matrix.cmake_arch_flags }}

    - name: Build Project
      shell: bash
      run: |
        cd build
        cmake --build . --config Release --parallel 2

    - name: Find executable (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        if [ -f "build/tarc" ]; then
          echo "EXECUTABLE_PATH=build/tarc" >> $GITHUB_ENV
        elif [ -f "build/Release/tarc" ]; then
          echo "EXECUTABLE_PATH=build/Release/tarc" >> $GITHUB_ENV
        else
          find build -name "tarc" -type f | head -1 | xargs -I {} echo "EXECUTABLE_PATH={}" >> $GITHUB_ENV
        fi

    - name: Find executable (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        if [ -f "build/Release/tarc.exe" ]; then
          echo "EXECUTABLE_PATH=build/Release/tarc.exe" >> $GITHUB_ENV
        elif [ -f "build/tarc.exe" ]; then
          echo "EXECUTABLE_PATH=build/tarc.exe" >> $GITHUB_ENV
        else
          find build -name "tarc.exe" -type f | head -1 | xargs -I {} echo "EXECUTABLE_PATH={}" >> $GITHUB_ENV
        fi

    - name: Test executable
      shell: bash
      run: |
        chmod +x ${{ env.EXECUTABLE_PATH }} 2>/dev/null || true
        ${{ env.EXECUTABLE_PATH }} -h || true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ env.EXECUTABLE_PATH }}
        if-no-files-found: error

  # Job separato per creare Universal Binary su macOS
  create-universal:
    name: Create macOS Universal Binary
    needs: build
    runs-on: macos-latest
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    steps:
    - name: Download Intel artifact
      uses: actions/download-artifact@v4
      with:
        name: tarc-macos-x86_64
        path: intel_build

    - name: Download ARM artifact
      uses: actions/download-artifact@v4
      with:
        name: tarc-macos-arm64
        path: arm_build

    - name: Create Universal Binary
      run: |
        cp intel_build/tarc tarc-x86_64
        cp arm_build/tarc tarc-arm64
        chmod +x tarc-x86_64 tarc-arm64
        
        # Crea universal binary usando lipo
        lipo -create -output tarc-universal tarc-x86_64 tarc-arm64
        
        # Verifica architetture
        lipo -info tarc-universal
        
        echo "Universal binary created successfully"

    - name: Upload universal artifact
      uses: actions/upload-artifact@v4
      with:
        name: tarc-macos-universal
        path: tarc-universal

  create-release:
    name: Create Release
    needs: [build, create-universal]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Prepare release files
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "📦 Versione: $VERSION"

        # Linux
        find artifacts -type f -name "tarc-linux-x86_64" | head -1 | xargs -I {} cp {} tarc-$VERSION-linux-x86_64

        # Windows
        find artifacts -type f -name "tarc-windows-x64.exe" | head -1 | xargs -I {} cp {} tarc-$VERSION-windows-x64.exe

        # macOS Universal
        find artifacts -type f -name "tarc-macos-universal" | head -1 | xargs -I {} cp {} tarc-$VERSION-macos-universal

        chmod +x tarc-$VERSION-* 2>/dev/null || true

        echo "✅ File pronti:"
        ls -lh tarc-$VERSION-* || echo "❌ Nessun file trovato"

    - name: Generate checksums
      run: |
        sha256sum tarc-* > checksums.txt
        cat checksums.txt

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          tarc-*
          checksums.txt
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
