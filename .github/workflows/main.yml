name: Build TARC Cross-Platform

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            cmake_generator: "Unix Makefiles"
            artifact_name: tarc-linux
            executable: tarc
          - os: windows-latest
            cmake_generator: "Visual Studio 17 2022"
            artifact_name: tarc-windows.exe
            executable: tarc.exe
            cmake_arch: "-A x64"
          - os: macos-latest
            cmake_generator: "Unix Makefiles"
            artifact_name: tarc-macos
            executable: tarc

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install cmake ninja

    - name: Setup MSVC (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure CMake
      shell: bash
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_C_STANDARD=11 \
          -DCMAKE_POSITION_INDEPENDENT_CODE=ON

    - name: Build Project
      shell: bash
      run: |
        cd build
        cmake --build . --config Release --parallel 2

    - name: Find executable (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        if [ -f "build/tarc" ]; then
          echo "EXECUTABLE_PATH=build/tarc" >> $GITHUB_ENV
        elif [ -f "build/Release/tarc" ]; then
          echo "EXECUTABLE_PATH=build/Release/tarc" >> $GITHUB_ENV
        else
          find build -name "tarc" -executable -type f | head -1 | xargs -I {} echo "EXECUTABLE_PATH={}" >> $GITHUB_ENV
        fi

    - name: Find executable (Windows)
      if: runner.os == 'Windows'
      run: |
        if (Test-Path "build/Release/tarc.exe") {
          echo "EXECUTABLE_PATH=build/Release/tarc.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        } elseif (Test-Path "build/tarc.exe") {
          echo "EXECUTABLE_PATH=build/tarc.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        } else {
          Get-ChildItem -Path build -Filter "tarc.exe" -Recurse | Select-Object -First 1 | ForEach-Object { echo "EXECUTABLE_PATH=$($_.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append }
        }
      shell: pwsh

    - name: Test executable
      shell: bash
      run: |
        chmod +x ${{ env.EXECUTABLE_PATH }} 2>/dev/null || true
        ${{ env.EXECUTABLE_PATH }} -h || true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ env.EXECUTABLE_PATH }}
        if-no-files-found: error

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: List artifacts
      run: |
        ls -la artifacts/
        find artifacts -type f -exec ls -lh {} \;

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/tarc-linux/tarc
          artifacts/tarc-windows.exe/tarc.exe
          artifacts/tarc-macos/tarc
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
