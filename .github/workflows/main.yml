name: Build TARC Cross-Platform

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            artifact_name: tarc-linux-x86_64
            executable: tarc
            cmake_arch_flags: ""
          
          # Windows x64
          - os: windows-latest
            artifact_name: tarc-windows-x64.exe
            executable: tarc.exe
            cmake_arch_flags: "-A x64"
          
          # macOS Universal Binary (funziona su Intel e Apple Silicon)
          - os: macos-latest
            artifact_name: tarc-macos-universal
            executable: tarc
            cmake_arch_flags: "-DCMAKE_OSX_ARCHITECTURES='x86_64;arm64'"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install cmake ninja

    - name: Setup MSVC (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure CMake (Linux/Windows)
      if: runner.os != 'macOS'
      shell: bash
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_C_STANDARD=11 \
          -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
          ${{ matrix.cmake_arch_flags }}

    - name: Configure CMake (macOS Universal)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_C_STANDARD=11 \
          -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
          -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

    - name: Build Project
      shell: bash
      run: |
        cd build
        cmake --build . --config Release --parallel 2

    - name: Find executable (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        if [ -f "build/tarc" ]; then
          echo "EXECUTABLE_PATH=build/tarc" >> $GITHUB_ENV
        elif [ -f "build/Release/tarc" ]; then
          echo "EXECUTABLE_PATH=build/Release/tarc" >> $GITHUB_ENV
        else
          find build -name "tarc" -executable -type f | head -1 | xargs -I {} echo "EXECUTABLE_PATH={}" >> $GITHUB_ENV
        fi

    - name: Find executable (Windows)
      if: runner.os == 'Windows'
      run: |
        if (Test-Path "build/Release/tarc.exe") {
          echo "EXECUTABLE_PATH=build/Release/tarc.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        } elseif (Test-Path "build/tarc.exe") {
          echo "EXECUTABLE_PATH=build/tarc.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        } else {
          Get-ChildItem -Path build -Filter "tarc.exe" -Recurse | Select-Object -First 1 | ForEach-Object { echo "EXECUTABLE_PATH=$($_.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append }
        }
      shell: pwsh

    - name: Verify architecture (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        echo "Verificando architettura del binario universale..."
        file ${{ env.EXECUTABLE_PATH }}
        if file ${{ env.EXECUTABLE_PATH }} | grep -q "universal"; then
          echo "✅ Universal binary OK (x86_64 + arm64)"
        else
          echo "⚠️ Il binario non è universale"
          file ${{ env.EXECUTABLE_PATH }}
        fi

    - name: Test executable
      shell: bash
      run: |
        chmod +x ${{ env.EXECUTABLE_PATH }} 2>/dev/null || true
        ${{ env.EXECUTABLE_PATH }} -h || true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ env.EXECUTABLE_PATH }}
        if-no-files-found: error

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: List artifacts
      run: |
        echo "📦 Artifacts scaricati:"
        ls -la artifacts/
        echo ""
        echo "📁 Dettaglio file:"
        find artifacts -type f -exec ls -lh {} \;

    - name: Prepare release files
      run: |
        # Rinomina i file per la release
        cp artifacts/tarc-linux-x86_64/tarc ./tarc-linux-x86_64 2>/dev/null || true
        cp artifacts/tarc-windows-x64.exe/tarc.exe ./tarc-windows-x64.exe 2>/dev/null || true
        cp artifacts/tarc-macos-universal/tarc ./tarc-macos-universal 2>/dev/null || true
        
        # Rendi eseguibili i file Unix
        chmod +x tarc-linux-x86_64 2>/dev/null || true
        chmod +x tarc-macos-universal 2>/dev/null || true
        
        echo "✅ File preparati per la release:"
        ls -lh tarc-* || echo "Nessun file trovato"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          tarc-linux-x86_64
          tarc-windows-x64.exe
          tarc-macos-universal
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
